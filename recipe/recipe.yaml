# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "3.18"
  python_check_max: "3.14"

package:
  name: idna
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/i/idna/idna-${{ version }}.tar.gz
  sha256: ffb385a7e039654cef1ab9ef32c6fafe283c0c0467bba1d9029738ce4a14a848

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --disable-pip-version-check
  python:
    entry_points:
      - idna = idna.cli:main

requirements:
  host:
    - flit-core >=3.11,<5
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports: idna
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - files:
      source:
        - tests/
    requirements:
      run:
        - python ${{ python_min }}.*
        - pytest >=8.3.2
    script:
      - idna --help
      - idna --version
      - idna --version | ${{ "grep -iE" if unix else "findstr" }} "${{ version | replace('.', '\\.') }}"
      - pytest -vv --tb=long --color=yes

about:
  homepage: https://pypi.org/project/idna
  repository: https://github.com/kjd/idna
  license: BSD-3-Clause
  license_file: LICENSE.md
  summary: Internationalized Domain Names in Applications (IDNA).
  description: |
    A library to support the Internationalised Domain Names in Applications
    (IDNA) protocol as specified in RFC 5891. This version of the protocol
    is often referred to as "IDNA2008".

extra:
  recipe-maintainers:
    - goanpeca
    - jschueller
    - bollwyvl
